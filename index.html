function dailyLook(d){if(d.country==="Peru"||d.country==="Bolívia")return"Look em camadas: camiseta dry-fit + fleece/casaco + calça confortável + tênis. Leve corta-vento.";if(d.country==="Chile")return"Look confortável com camada extra. No Atacama: óculos, protetor e corta-vento.";return"Look confortável para deslocamento."}function dayTip(d,t){if(t.some(x=>String(x.altitude||"").includes("Muito alta")))return "Dica: hoje é dia de altitude extrema. Hidrate-se, coma leve, vá devagar e não force o ritmo.";if(t.some(x=>String(x.altitude||"").includes("Alta")))return "Dica: altitude alta. Hidrate-se, coma leve, caminhe devagar e leve camadas.";if(t.some(x=>/neve|Geysers|frio/i.test(x.name)))return "Dica: o frio é mais forte cedo. Use camadas, luvas e gorro.";if(t.some(x=>/Huacachina|Salar|Atacama|deserto/i.test(x.name)))return "Dica: óculos e protetor são obrigatórios. Proteja celular/câmera da areia.";return "Dica: deixe documento, dinheiro físico e power bank sempre na mochila."}function toggleDay(id){let d=data.days.find(x=>x.id===id);d.done=!d.done;save();render()}

function packing(){let keys=data.packing.flatMap(g=>g.items.map(i=>g.group+"|"+i)),done=keys.filter(k=>data.packState[k]).length,pct=keys.length?Math.round(done/keys.length*100):0,groupBars=data.packing.map(g=>{let total=g.items.length,doneG=g.items.filter(i=>data.packState[g.group+"|"+i]).length,pctG=total?Math.round(doneG/total*100):0;return`<div class="bar"><div class="barLabel">${cleanGroupLabel(g.group).slice(0,18)}</div><div class="barTrack"><div class="barFill" style="width:${pctG}%;background:linear-gradient(90deg,var(--lg),var(--gold))"></div></div><div class="barVal">${pctG}%</div></div>`}).join("");return head("Mala",false)+`<div class="card"><div class="kicker">Checklist</div><h2>${done}/${keys.length} itens conferidos</h2><div class="progress"><div style="width:${pct}%"></div></div><p class="muted">Mala de bordo + mochila para neve, deserto, altitude, trilhas e cidades.</p></div><div class="card"><div class="kicker">Percentual por grupo</div><h2>Resumo visual da mala</h2>${groupBars}<p class="muted">Gráfico em barras horizontais mostrando o percentual já separado em cada grupo.</p></div><div class="card"><div class="kicker">Essenciais por situação</div><div class="row"><div><b>Frio/neve</b><div class="small muted">Segunda pele, puffer, luva, gorro, bota</div></div><span>❄️</span></div><div class="row"><div><b>Trilha/altitude</b><div class="small muted">Camadas, água, lanche, protetor, remédios</div></div><span>⛰️</span></div><div class="row"><div><b>Deserto/praia</b><div class="small muted">Óculos, protetor, roupa leve, corta-vento</div></div><span>☀️</span></div></div>`+data.packing.map(g=>`<details open><summary>${g.group}</summary>${g.items.map(i=>{let k=g.group+"|"+i;return`<label class="check"><input type="checkbox" ${data.packState[k]?"checked":""} onchange="data.packState['${esc(k)}']=this.checked;save();render()"><span>${i}</span><span class="pill gray">levar</span></label>`}).join("")}</details>`).join("")}

function maps(){let places=[...data.stays.map(h=>({name:h.name||h.city,city:h.city,country:h.country,type:"Hospedagem",cat:"Hospedagem",maps:h.maps})),...data.tours.map(t=>({name:t.name,city:t.city,country:t.country,type:"Passeio",cat:"Passeio",maps:t.maps})),...data.food.map(f=>({name:f.name,city:f.city,country:f.country,type:f.cat,cat:f.cat,maps:f.maps})),...data.flights.map(f=>({name:f.title,city:f.to,country:f.country,type:"Voo/Aeroporto",cat:"Voo/Aeroporto",maps:f.maps}))].filter(match).filter(p=>filter==="Todos"||p.country===filter),cats=["Tudo","Hospedagem","Passeio","Voo/Aeroporto","Restaurante","Café","Sorveteria","Rooftop","Barato e bom","Sunset"];places=places.filter(p=>mapFilter==="Tudo"||p.cat===mapFilter||p.type===mapFilter);return head("Mapas")+filterBar()+`<div class="card"><div class="kicker">Acesso rápido</div><h2>Mapas de tudo</h2><p class="muted">Filtre por país e por categoria: hotéis, passeios, voos e gastronomia.</p></div><div class="mapCatBar">${cats.map(c=>`<button class="${mapFilter===c?"on":""}" onclick="mapFilter='${c}';render()">${c}</button>`).join("")}</div>`+places.map(p=>`<a class="row" target="_blank" href="${p.maps||map(p.name+" "+p.city)}"><div><b>📍 ${p.name}</b><div class="small muted">${p.type} · ${p.city}${p.country?(" · "+p.country):""}</div></div><span class="pill">Abrir</span></a>`).join("")+(places.length?"":`<div class="empty">Nenhum mapa encontrado com estes filtros.</div>`)}
function converter(){return head("Câmbio",false)+`<div class="card"><div class="kicker">Conversor rápido</div><h2>Converter moedas</h2><div class="form"><div class="grid two"><div><label class="lbl">Valor</label><input id="convAmount" inputmode="decimal" placeholder="0,00" oninput="doConvert()"></div><div><label class="lbl">De</label><select id="convFrom" onchange="doConvert()">${["CLP","BOB","PEN","USD","BRL"].map(c=>`<option>${c}</option>`).join("")}</select></div></div><div><label class="lbl">Para</label><select id="convTo" onchange="doConvert()">${["BRL","CLP","BOB","PEN","USD"].map(c=>`<option>${c}</option>`).join("")}</select></div><div class="row"><div><b>Resultado</b><div id="convResult" class="money">—</div></div></div></div></div><div class="card"><div class="kicker">Taxas</div><h2>1 unidade em R$</h2><div class="form">${["CLP","BOB","PEN","USD"].map(c=>`<div><label class="lbl">1 ${c} = R$</label><input inputmode="decimal" value="${data.rates[c]}" onchange="data.rates['${c}']=num(this.value);save();doConvert()"></div>`).join("")}</div></div>`}function doConvert(){let a=num(document.getElementById("convAmount")?.value),from=document.getElementById("convFrom")?.value,to=document.getElementById("convTo")?.value,r=document.getElementById("convResult");if(!r)return;if(!a){r.textContent="—";return}let inBRL=from==="BRL"?a:a*num(data.rates[from]),out=to==="BRL"?inBRL:inBRL/num(data.rates[to]);r.textContent=out.toLocaleString("pt-BR",{maximumFractionDigits:2,minimumFractionDigits:2})+" "+to}
function docs(){return head("Documentos")+`<div class="card"><div class="kicker">Vouchers e arquivos</div><h2>Controle de documentos</h2><p class="muted">Cole links de Drive, e-mail, PDF, reserva ou observações.</p></div>`+data.docs.filter(match).map(d=>`<div class="card"><h3>📄 ${d.name}</h3><span class="pill ${statusCls(d.status)}">${d.status}</span>${d.notes?`<p class="muted">${d.notes}</p>`:""}<div class="actions"><button class="btn light" onclick="openDoc('${d.id}')">Editar</button>${d.link?`<a target="_blank" class="btn light" href="${d.link}">Abrir</a>`:""}<button class="btn red" onclick="removeItem('docs','${d.id}')">Excluir</button></div></div>`).join("")}function backup(){return head("Backup",false)+`<div class="card"><div class="kicker">Segurança dos dados</div><h2>Exportar e importar</h2><p class="muted">O app salva no navegador. Exporte um JSON antes de trocar aparelho, limpar dados ou mudar o link do GitHub Pages.</p><div class="actions"><button class="btn" onclick="exportBackup()">Exportar JSON</button><label class="btn light">Importar JSON<input type="file" accept=".json" style="display:none" onchange="importBackup(event)"></label><button class="btn red" onclick="resetApp()">Restaurar base</button></div></div><div class="card"><h2>Anotações gerais</h2><textarea onchange="data.notes=this.value;save()">${esc(data.notes)}</textarea></div>`}function settings(){return head("Ajustes",false)+`<div class="card"><div class="kicker">Sobre o salvamento</div><h2>Como os dados ficam salvos</h2><p class="muted">O app usa localStorage: salva no mesmo navegador, mesmo aparelho e mesmo endereço do GitHub Pages.</p><div class="note">Para sincronizar entre aparelhos, o próximo passo é conectar com Supabase ou Firebase.</div></div><div class="card"><div class="kicker">PWA</div><h2>Adicionar à tela inicial</h2><p class="muted">No iPhone: abra o link no Safari → Compartilhar → Adicionar à Tela de Início.</p></div>`}
function inputField(id,label,value="",placeholder="",type="text"){return`<div><label class="lbl">${label}</label><input id="${id}" type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}"></div>`}function selectField(id,label,opts,value){return`<div><label class="lbl">${label}</label><select id="${id}">${opts.map(x=>opt(x,value)).join("")}</select></div>`}function textField(id,label,value="",placeholder=""){return`<div><label class="lbl">${label}</label><textarea id="${id}" placeholder="${esc(placeholder)}">${esc(value)}</textarea></div>`}function openDayEdit(id){let d=data.days.find(x=>x.id===id);modal("Editar dia",`<div class="form">${inputField("dy_city","Cidade/título",d.city)}${selectField("dy_country","País",["Chile","Bolívia","Peru","Brasil"],d.country)}${inputField("dy_sleep","Onde dorme",d.sleep)}${inputField("dy_weather","Clima",d.weather)}${textField("dy_summary","Resumo",d.summary)}<button class="btn full" onclick="saveDay('${id}')">Salvar dia</button></div>`)}function saveDay(id){let d=data.days.find(x=>x.id===id);d.city=val("dy_city");d.country=val("dy_country");d.sleep=val("dy_sleep");d.weather=val("dy_weather");d.summary=val("dy_summary");save();closeModal();render()}function dayOptions(s=""){return data.days.map(d=>`<option value="${d.id}" ${d.id===s?"selected":""}>Dia ${d.num} — ${d.date} — ${d.city}</option>`).join("")}function openEvent(di="",ei=""){let d=di?data.days.find(x=>x.id===di):data.days[0],e=ei?d.events.find(x=>x.id===ei):{time:"",type:"Passeio",title:"",place:"",notes:"",maps:""};modal(ei?"Editar evento":"Adicionar evento",`<div class="form"><div><label class="lbl">Dia</label><select id="ev_day">${dayOptions(di||d.id)}</select></div>${inputField("ev_time","Horário",e.time)}${selectField("ev_type","Tipo",["Voo","Transporte","Hospedagem","Passeio","Gastronomia","Livre","Documento","Outro"],e.type)}${inputField("ev_title","Título",e.title)}${inputField("ev_place","Local",e.place)}${inputField("ev_maps","Mapa",e.maps)}${textField("ev_notes","Observações",e.notes)}<button class="btn full" onclick="saveEvent('${di}','${ei}')">Salvar evento</button></div>`)}function saveEvent(odi,ei){let d=data.days.find(x=>x.id===val("ev_day")),o={id:ei||uid("ev"),time:val("ev_time"),type:val("ev_type"),title:val("ev_title"),place:val("ev_place"),maps:val("ev_maps"),notes:val("ev_notes"),ref:""};if(!o.title)return alert("Digite o título.");if(ei&&odi){let old=data.days.find(x=>x.id===odi);old.events=old.events.filter(e=>e.id!==ei)}d.events.push(o);currentDay=d.id;save();closeModal();render()}function deleteEvent(di,ei){if(!confirm("Excluir evento?"))return;let d=data.days.find(x=>x.id===di);d.events=d.events.filter(e=>e.id!==ei);save();render()}

al("h_notes"),expenseId:old?.expenseId||""};upsert("stays",o);syncStay(o);save();closeModal();render()}function syncStay(h){if(h.total>0){let eid=h.expenseId||uid("g");h.expenseId=eid;upsert("expenses",{id:eid,linkedType:"stay",linkedId:h.id,name:"Hospedagem — "+(h.name||h.city),cat:"Hospedagem",country:h.country,city:h.city,currency:h.currency,localValue:h.total,brlValue:toBRL(h.total,h.currency),status:h.status==="Pago"?"Pago":"Previsto",paid:h.paid>=toBRL(h.total,h.currency)&&h.total>0,notes:"Criado automaticamente pela hospedagem."})}data.days.forEach(d=>d.events=d.events.filter(e=>e.ref!==h.id));let din=data.days.find(d=>d.date===h.checkinDate);if(din)din.events.push(eventObj(h.checkinTime||"A preencher","Hospedagem","Check-in — "+(h.name||h.city),h.city,h.area,h.maps,h.id));let dout=data.days.find(d=>d.date===h.checkoutDate);if(dout)dout.events.push(eventObj(h.checkoutTime||"A preencher","Hospedagem","Check-out — "+(h.name||h.city),h.city,h.area,h.maps,h.id))}

function openFlight(id=""){let f=id?data.flights.find(x=>x.id===id):{id:"",title:"",date:"",country:"Chile",airline:"",flightNo:"",from:"",to:"",depart:"",arrive:"",locator:"",status:"A preencher",maps:"",notes:""};modal(id?"Editar voo":"Adicionar voo",`<div class="form">${inputField("fl_title","Trecho",f.title)}<div class="grid two">${inputField("fl_date","Data",f.date)}${selectField("fl_country","País",["Chile","Bolívia","Peru","Brasil","Geral"],f.country)}</div><div class="grid two">${inputField("fl_from","Origem",f.from)}${inputField("fl_to","Destino",f.to)}</div><div class="grid two">${inputField("fl_depart","Saída",f.depart)}${inputField("fl_arrive","Chegada",f.arrive)}</div><div class="grid two">${inputField("fl_air","Companhia",f.airline)}${inputField("fl_no","Voo",f.flightNo)}</div>${inputField("fl_locator","Localizador",f.locator)}${selectField("fl_status","Status",["A preencher","Comprado","Check-in aberto","Check-in feito","Concluído","Cancelado"],f.status)}${inputField("fl_maps","Mapa",f.maps)}${textField("fl_notes","Observações",f.notes)}<button class="btn full" onclick="saveFlight('${id}')">Salvar voo</button></div>`)}function saveFlight(id){let o={id:id||uid("fl"),title:val("fl_title"),date:val("fl_date"),country:val("fl_country"),from:val("fl_from"),to:val("fl_to"),depart:val("fl_depart"),arrive:val("fl_arrive"),airline:val("fl_air"),flightNo:val("fl_no"),locator:val("fl_locator"),status:val("fl_status"),maps:val("fl_maps"),notes:val("fl_notes")};upsert("flights",o);syncFlight(o);save();closeModal();render()}function syncFlight(f){data.days.forEach(d=>d.events=d.events.map(e=>e.ref===f.id?{...e,time:f.depart||"A preencher",title:"Voo "+f.title,place:f.from+" → "+f.to,notes:`Saída: ${f.depart||"A preencher"} · Chegada: ${f.arrive||"A preencher"} · ${f.airline||""} ${f.flightNo||""} · Localizador: ${f.locator||"a preencher"}`,maps:f.maps}:e));let d=data.days.find(x=>x.date===f.date);if(d&&!d.events.some(e=>e.ref===f.id))d.events.push(eventObj(f.depart function openExpense(id=""){let g=id?data.expenses.find(x=>x.id===id):{id:"",name:"",cat:"Passeios",country:"Geral",city:"",currency:"BRL",localValue:0,brlValue:0,status:"Previsto",paid:false,notes:""};modal(id?"Editar gasto":"Adicionar gasto",`<div class="form">${inputField("g_name","Nome",g.name)}${selectField("g_cat","Categoria",["Voos","Hospedagem","Passeios","Transporte","Alimentação","Seguro","Compras","Emergência","Outros"],g.cat)}<div class="grid two">${selectField("g_country","País",["Chile","Bolívia","Peru","Brasil","Geral"],g.country)}${inputField("g_city","Cidade",g.city)}</div><div class="grid two">${selectField("g_cur","Moeda",["BRL","CLP","BOB","PEN","USD"],g.currency)}${inputField("g_local","Valor local",g.localValue||"","","number")}</div>${inputField("g_brl","Valor em R$",g.brlValue||"","","number")}${selectField("g_status","Status",["Previsto","Reservado","Pago","Cancelado"],g.status)}<label class="check"><input id="g_paid" type="checkbox" ${g.paid?"checked":""}><span>Já foi pago?</span><span class="pill gray">status</span></label>${textField("g_notes","Observações",g.notes)}<button class="btn full" onclick="saveExpense('${id}')">Salvar gasto</button></div>`)}function saveExpense(id){let o={id:id||uid("g"),name:val("g_name"),cat:val("g_cat"),country:val("g_country"),city:val("g_city"),currency:val("g_cur"),localValue:num(val("g_local")),brlValue:num(val("g_brl")),status:val("g_status"),paid:document.getElementById("g_paid").checked,notes:val("g_notes")};if(!o.brlValue&&o.localValue)o.brlValue=toBRL(o.localValue,o.currency);upsert("expenses",o);save();closeModal();render()}

function exportBackup(){let b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="backup-altiplano-v6-2026.json";a.click();URL.revokeObjectURL(a.href)}function importBackup(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();alert("Backup importado!")}catch(err){alert("Backup inválido.")}};r.readAsText(file)}function resetApp(){if(confirm("Restaurar a viagem atual para a base inicial?")){let t=getActiveTrip();if(t){let copy=JSON.parse(JSON.stringify(baseData));copy.trip=t.data.trip||copy.trip;t.data=copy;data=t.data;persistTripStore();render()}}}if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}))}render();
