<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#07101f" />
<title>Trip App 2026 — Chile • Bolívia • Peru</title>

<style>
:root{
  --bg:#07101f;
  --bg2:#102a4d;
  --bg3:#183b68;
  --card:#ffffff;
  --soft:#f3f6fb;
  --line:#e5e7eb;
  --text:#111827;
  --muted:#667085;
  --blue:#143d73;
  --blue2:#2563eb;
  --gold:#f59e0b;
  --green:#067647;
  --red:#b42318;
  --shadow:0 12px 34px rgba(16,24,40,.10);
  --r:22px;
  --safeBottom:env(safe-area-inset-bottom);
  --safeTop:env(safe-area-inset-top);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  background:var(--soft);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
}
body{padding-bottom:96px}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
a{color:inherit}
.app{max-width:620px;margin:0 auto;min-height:100vh}
.hero{
  position:sticky;
  top:0;
  z-index:10;
  background:
    radial-gradient(circle at 90% 5%,rgba(245,158,11,.25),transparent 26%),
    linear-gradient(155deg,var(--bg),var(--bg2) 70%,var(--bg3));
  color:#fff;
  padding:calc(18px + var(--safeTop)) 16px 18px;
  border-radius:0 0 32px 32px;
  box-shadow:0 18px 50px rgba(7,16,31,.28);
}
.heroTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
h1{font-size:31px;line-height:1;margin:0;letter-spacing:-.8px}
.sub{font-size:15px;font-weight:800;color:#d6e6ff;margin:8px 0 0}
.badge{
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.22);
  padding:8px 11px;
  border-radius:999px;
  font-size:12px;
  font-weight:950;
  white-space:nowrap;
}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.stat{
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  padding:10px;
  min-height:70px;
}
.stat b{font-size:20px;display:block}
.stat span{font-size:10px;color:#d6e6ff;font-weight:850}
.search{display:flex;gap:8px;margin-top:12px}
.search input{
  background:rgba(255,255,255,.13);
  border:1px solid rgba(255,255,255,.24);
  border-radius:16px;
  color:#fff;
  padding:12px;
  outline:0;
  width:100%;
}
.search input::placeholder{color:#d2dced}
.search button{
  background:#fff;
  color:var(--blue);
  border-radius:16px;
  font-weight:950;
  padding:0 13px;
}
main{padding:14px 12px 6px}
.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:12px;
}
.kicker{
  text-transform:uppercase;
  letter-spacing:.08em;
  font-size:11px;
  color:var(--muted);
  font-weight:950;
  margin-bottom:6px;
}
h2{font-size:22px;line-height:1.1;margin:0 0 10px}
h3{font-size:17px;margin:0 0 6px}
p{margin:8px 0}
.muted{color:var(--muted)}
.small{font-size:12px}
.grid{display:grid;gap:10px}
.two{grid-template-columns:1fr 1fr}
.three{grid-template-columns:repeat(3,1fr)}
.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
.quick button{
  background:#fff;
  color:var(--blue);
  border-radius:18px;
  padding:12px 7px;
  font-size:12px;
  font-weight:950;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.quick .ico{display:block;font-size:24px;margin-bottom:4px}
.pill{
  display:inline-flex;
  align-items:center;
  gap:5px;
  border-radius:999px;
  padding:6px 9px;
  font-size:12px;
  font-weight:900;
  margin:2px;
  background:#eef4ff;
  color:#1849a9;
}
.chile{background:#fff1f3;color:#a1102a}
.bolivia{background:#ecfdf3;color:#067647}
.peru{background:#fff6ed;color:#b93815}
.gold{background:#fffaeb;color:#b54708}
.green{background:#ecfdf3;color:#067647}
.red{background:#fee4e2;color:#b42318}
.gray{background:#f2f4f7;color:#344054}
.dark{background:#111827;color:white}
.btn{
  display:inline-flex;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  border-radius:15px;
  background:var(--blue);
  color:white;
  font-weight:950;
  padding:11px 13px;
  gap:7px;
}
.btn.light{background:#eef4ff;color:#1849a9}
.btn.gray{background:#f2f4f7;color:#344054}
.btn.red{background:#fee4e2;color:#b42318}
.btn.gold{background:#fffaeb;color:#b54708}
.btn.green{background:#ecfdf3;color:#067647}
.btn.full{width:100%}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
  background:#fff;
  margin-top:8px;
}
.dayButton{
  text-align:left;
  width:100%;
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:14px;
  display:grid;
  grid-template-columns:68px 1fr auto;
  gap:12px;
  align-items:center;
  margin-bottom:10px;
}
.date{
  background:#f3f6fb;
  border:1px solid var(--line);
  border-radius:18px;
  text-align:center;
  padding:10px 5px;
  color:var(--blue);
  font-weight:950;
}
.date span{
  display:block;
  color:#667085;
  font-size:11px;
  margin-top:2px;
  line-height:1.25;
}
.chev{font-size:24px;color:#98a2b3;font-weight:900}
.timeline{display:grid;gap:8px;margin-top:12px}
.event{
  display:grid;
  grid-template-columns:58px 1fr;
  gap:10px;
  align-items:start;
  border:1px solid var(--line);
  border-radius:17px;
  padding:10px;
  background:#fff;
}
.etime{font-weight:950;color:var(--blue);font-size:13px}
.etype{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:#667085;
  font-weight:900;
}
input,select,textarea{
  border:1px solid #d0d5dd;
  background:#fff;
  border-radius:15px;
  padding:12px;
  width:100%;
  outline:0;
}
textarea{min-height:90px;resize:vertical}
.form{display:grid;gap:8px}
.money{font-size:30px;font-weight:950;letter-spacing:-.8px}
.total{background:linear-gradient(160deg,var(--blue),var(--bg));color:white}
.note{
  background:#fffaeb;
  border:1px solid #fedf89;
  color:#7a2e0e;
  border-radius:16px;
  padding:12px;
  font-size:13px;
}
.empty{text-align:center;color:#667085;padding:22px}
.progress{height:12px;background:#eef2f7;border-radius:999px;overflow:hidden}
.progress div{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--blue2),var(--gold))}
.checkrow{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  border:1px solid var(--line);
  border-radius:16px;
  padding:11px;
  background:#fff;
  margin-top:8px;
}
.checkrow input{width:22px;height:22px;accent-color:var(--blue)}
details{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 6px 16px rgba(16,24,40,.05);
}
summary{font-weight:950;cursor:pointer}
.nav{
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(16px);
  border-top:1px solid var(--line);
  padding:8px 7px calc(8px + var(--safeBottom));
  z-index:20;
}
.navInner{
  max-width:620px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}
.nav button{
  background:transparent;
  color:#667085;
  border-radius:15px;
  padding:7px 3px;
  font-size:10px;
  font-weight:950;
}
.nav button.active{background:#eef4ff;color:var(--blue)}
.nicon{display:block;font-size:20px;margin-bottom:2px}
.modalWrap{
  position:fixed;
  inset:0;
  background:rgba(7,16,31,.54);
  display:none;
  align-items:flex-end;
  z-index:40;
  backdrop-filter:blur(4px);
}
.modalWrap.show{display:flex}
.modal{
  background:#fff;
  border-radius:26px 26px 0 0;
  padding:16px 14px calc(16px + var(--safeBottom));
  width:100%;
  max-width:620px;
  margin:0 auto;
  max-height:88vh;
  overflow:auto;
  box-shadow:0 -20px 50px rgba(0,0,0,.18);
}
.modalHead{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}
.close{
  background:#f2f4f7;
  border-radius:50%;
  width:38px;
  height:38px;
  font-size:22px;
  color:#344054;
}
.fab{
  position:fixed;
  right:18px;
  bottom:calc(92px + var(--safeBottom));
  z-index:18;
  background:var(--gold);
  color:#111827;
  border-radius:20px;
  padding:14px 16px;
  font-weight:950;
  box-shadow:0 14px 28px rgba(245,158,11,.32);
}
@media(max-width:440px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .two,.three{grid-template-columns:1fr}
  .quick{grid-template-columns:repeat(2,1fr)}
  .dayButton{grid-template-columns:62px 1fr auto}
}
</style>
</head>

<body>
<div class="app">
<header class="hero">
  <div class="heroTop">
    <div>
      <h1>Trip App 2026</h1>
      <p class="sub">Chile • Bolívia • Peru<br>Roteiro, gastos, comer e mala</p>
    </div>
    <div class="badge">GitHub Pages</div>
  </div>

  <div class="stats">
    <div class="stat"><b>21</b><span>dias</span></div>
    <div class="stat"><b id="hTours">0</b><span>passeios</span></div>
    <div class="stat"><b id="hTotal">R$ 0</b><span>previsto</span></div>
    <div class="stat"><b id="hPack">0%</b><span>mala</span></div>
  </div>

  <div class="search">
    <input id="search" placeholder="Buscar: voo, check-in, Machu Picchu, café..." oninput="state.search=this.value; render()">
    <button onclick="state.search='';document.getElementById('search').value='';render()">Limpar</button>
  </div>
</header>

<main id="view"></main>
</div>

<button class="fab" id="fab" onclick="quickAdd()">➕ Adicionar</button>

<nav class="nav">
  <div class="navInner" id="nav"></div>
</nav>

<div class="modalWrap" id="modalWrap" onclick="if(event.target.id==='modalWrap') closeModal()">
  <div class="modal">
    <div class="modalHead">
      <h2 id="modalTitle">Editar</h2>
      <button class="close" onclick="closeModal()">×</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

  return {id:uid('ev'),time,type,title,place,notes,maps,ref};
}

let data=loadData();

function loadData(){
  try{
    const saved=JSON.parse(localStorage.getItem(LS));
    if(saved && saved.days && saved.tours) return saved;
  }catch(e){}
  return JSON.parse(JSON.stringify(baseData));
}

function save(){
  localStorage.setItem(LS,JSON.stringify(data));
  updateHeader();
}

function updateHeader(){
  const total =
    data.expenses.reduce((s,e)=>s+num(e.brlValue),0) +
    data.stays.reduce((s,h)=>s+num(h.total),0) +
    data.tours.reduce((s,t)=>s+num(t.value),0);

  const keys=data.packing.flatMap(g=>g.items.map(i=>g.group+'|'+i));
  const done=keys.filter(k=>data.packState[k]).length;

  document.getElementById('hTours').textContent=data.tours.length;
  document.getElementById('hTotal').textContent=money(total).replace(',00','');
  document.getElementById('hPack').textContent=keys.length?Math.round(done/keys.length*100)+'%':'0%';
}

function setTab(tab){
  active=tab;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderNav(){
  let items=bottom.slice();
  if(!items.includes(active) && active!=='dayDetail') items[4]=active;
  if(active==='dayDetail') items[1]='days';

  document.getElementById('nav').innerHTML=items.map(id=>{
    const t=tabs.find(x=>x[0]===id);
    return `<button class="${(active===id||(active==='dayDetail'&&id==='days'))?'active':''}" onclick="setTab('${id}')">
      <span class="nicon">${t[1]}</span>${t[2]}
    </button>`;
  }).join('');
}

function render(){
  renderNav();
  updateHeader();
  updateFab();

  const routes={
    home:renderHome,
    days:renderDays,
    dayDetail:renderDayDetail,
    flights:renderFlights,
    stays:renderStays,
    tours:renderTours,
    expenses:renderExpenses,
    food:renderFood,
    packing:renderPacking,
    maps:renderMaps,
    backup:renderBackup
  };

  document.getElementById('view').innerHTML=routes[active]();
}

function updateFab(){
  const labels={
    dayDetail:'➕ Evento',
    flights:'➕ Voo',
    stays:'➕ Hotel',
    tours:'➕ Tour',
    expenses:'➕ Gasto',
    food:'➕ Lugar'
  };
  const fab=document.getElementById('fab');
  fab.style.display=labels[active]?'block':'none';
  fab.textContent=labels[active]||'➕ Adicionar';
}

function quickAdd(){
  if(active==='dayDetail') openEvent(currentDayId);
  if(active==='flights') openFlight();
  if(active==='stays') openStay();
  if(active==='tours') openTour();
  if(active==='expenses') openExpense();
  if(active==='food') openFood();
}

      <div class="money">${money(paid)}</div>

  <div class="card">
    <div class="kicker">Roteiro inteligente</div>

  const linkedFlights=data.flights.filter(f=>d.events.some(e=>e.ref===f.id)||f.date===d.date);

  return `

    <button class="btn gray" onclick="setTab('days')">← Voltar aos dias</button>

function modal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalWrap').classList.add('show');
}
function closeModal(){document.getElementById('modalWrap').classList.remove('show')}

function openDaySummary(dayId){
  const d=data.days.find(x=>x.id===dayId);
  modal('Editar resumo do dia',`
  <div class="form">
    <input id="dy_city" value="${esc(d.city)}" placeholder="Cidade/título">
    <input id="dy_sleep" value="${esc(d.sleep)}" placeholder="Onde dorme">
    <input id="dy_weather" value="${esc(d.weather)}" placeholder="Clima">
    <textarea id="dy_summary">${esc(d.summary)}</textarea>
    <button class="btn full" onclick="saveDaySummary('${dayId}')">Salvar dia</button>
  </div>`);
}
function saveDaySummary(id){
  const d=data.days.find(x=>x.id===id);
  d.city=val('dy_city');
  d.sleep=val('dy_sleep');
  d.weather=val('dy_weather');
  d.summary=val('dy_summary');
  save();closeModal();render();
}

function dayOptions(selected=''){
  return data.days.map(d=>`<option value="${d.id}" ${d.id===selected?'selected':''}>Dia ${d.day} — ${d.date} — ${d.city}</option>`).join('');
}
function openEvent(dayId='',eventId=''){
  const d=dayId?data.days.find(x=>x.id===dayId):data.days[0];
  const e=eventId?d.events.find(x=>x.id===eventId):{id:'',time:'',type:'Passeio',title:'',place:'',notes:'',maps:'',ref:''};
  modal(eventId?'Editar evento':'Adicionar evento',`
  <div class="form">
    <select id="ev_day">${dayOptions(dayId||d.id)}</select>
    <input id="ev_time" placeholder="Horário: 08h, manhã, A preencher..." value="${esc(e.time)}">
    <select id="ev_type">${['Voo','Transporte','Hospedagem','Passeio','Gastronomia','Livre','Documento','Outro'].map(x=>opt(x,e.type)).join('')}</select>
    <input id="ev_title" placeholder="Título do evento" value="${esc(e.title)}">
    <input id="ev_place" placeholder="Local" value="${esc(e.place)}">
    <input id="ev_maps" placeholder="Link do Google Maps" value="${esc(e.maps)}">
    <textarea id="ev_notes" placeholder="Observações">${esc(e.notes)}</textarea>
    <button class="btn full" onclick="saveEvent('${dayId}','${eventId}')">Salvar evento</button>

function deleteItem(collection,id){

function upsert(collection,obj){

}

    ...data.flights.map(f=>({name:f.title,city:f.to,country:'',type:'Voo',maps:f.maps}))
  ].filter(match);

  return `<div class="card"><div class="kicker">Mapas de tudo</div><h2>Acesso rápido ao Google Maps</h2><p class="muted">Hotéis, voos/aeroportos, passeios e restaurantes.</p></div>
  ${places.map(p=>`
    <a class="row" style="text-decoration:none;color:inherit" target="_blank" href="${p.maps||map(p.name+' '+p.city)}">
      <div><b>📍 ${p.name}</b><div class="small muted">${p.type} · ${p.city} ${p.country?('· '+p.country):''}</div></div>
      <span class="pill">Abrir</span>
    </a>
  `).join('')}`;
}

function renderBackup(){
  return `<div class="card"><div class="kicker">Backup</div><h2>Salvar e restaurar</h2><p class="muted">O app salva automaticamente no navegador. Exporte um JSON para não perder suas informações.</p>
  <div class="actions">
    <button class="btn" onclick="exportBackup()">Exportar JSON</button>
    <label class="btn light">Importar JSON<input type="file" accept=".json,application/json" style="display:none" onchange="importBackup(event)"></label>
    <button class="btn red" onclick="resetApp()">Restaurar base</button>
  </div></div>
  <div class="card"><h2>Anotações gerais</h2><textarea oninput="data.notes=this.value;save()">${esc(data.notes)}</textarea></div>`;
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-trip-app-2026.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importBackup(e){
  const file=e.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      data=JSON.parse(r.result);
      save();render();
      alert('Backup importado!');
    }catch(err){alert('Backup inválido.')}
  };
  r.readAsText(file);
}
function resetApp(){
  if(confirm('Restaurar base inicial? Isso apaga edições salvas neste navegador.')){
    localStorage.removeItem(LS);
    data=loadData();
    render();
  }
}

render();
</script>
</body>
</html>
