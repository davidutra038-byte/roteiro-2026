function openStay(id=""){let h=id?data.stays.find(x=>x.id===id):{id:"",city:"",country:"Chile",name:"",checkinDate:"",checkoutDate:"",checkinTime:"",checkoutTime:"",nights:"",area:"",maps:"",bookingLink:"",code:"",contact:"",currency:"BRL",total:0,paid:0,status:"Pesquisando",notes:"",expenseId:""};modal(id?"Editar hospedagem":"Adicionar hospedagem",`<div class="form">${inputField("h_name","Nome",h.name)}<div class="grid two">${inputField("h_city","Cidade",h.city)}${selectField("h_country","País",["Chile","Bolívia","Peru","Brasil","Geral"],h.country)}</div>${inputField("h_area","Área/bairro",h.area)}<div class="grid two">${inputField("h_inD","Data check-in",h.checkinDate)}${inputField("h_inT","Hora",h.checkinTime)}</div><div class="grid two">${inputField("h_outD","Data check-out",h.checkoutDate)}${inputField("h_outT","Hora",h.checkoutTime)}</div>${inputField("h_maps","Mapa",h.maps)}${inputField("h_link","Link da reserva",h.bookingLink)}${inputField("h_code","Código reserva",h.code)}${inputField("h_contact","Contato",h.contact)}<div class="grid two">${selectField("h_currency","Moeda",["BRL","CLP","BOB","PEN","USD"],h.currency)}${inputField("h_total","Valor total",h.total||"","","number")}</div>${inputField("h_paid","Valor pago R$",h.paid||"","","number")}${selectField("h_status","Status",["Pesquisando","Pendente","Reservado","Pago","Cancelado"],h.status)}${textField("h_notes","Observações",h.notes)}<button class="btn full" onclick="saveStay('${id}')">Salvar hospedagem</button></div>`)}function saveStay(id){let old=id?data.stays.find(x=>x.id===id):null,o={id:id||uid("h"),name:val("h_name"),city:val("h_city"),country:val("h_country"),area:val("h_area"),checkinDate:val("h_inD"),checkinTime:val("h_inT"),checkoutDate:val("h_outD"),checkoutTime:val("h_outT"),nights:old?.nights||"",maps:val("h_maps"),bookingLink:val("h_link"),code:val("h_code"),contact:val("h_contact"),currency:val("h_currency"),total:num(val("h_total")),paid:num(val("h_paid")),status:val("h_status"),notes:val("h_notes"),expenseId:old?.expenseId||""};upsert("stays",o);syncStay(o);save();closeModal();render()}function syncStay(h){if(h.total>0){let eid=h.expenseId||uid("g");h.expenseId=eid;upsert("expenses",{id:eid,linkedType:"stay",linkedId:h.id,name:"Hospedagem — "+(h.name||h.city),cat:"Hospedagem",country:h.country,city:h.city,currency:h.currency,localValue:h.total,brlValue:toBRL(h.total,h.currency),status:h.status==="Pago"?"Pago":"Previsto",paid:h.paid>=toBRL(h.total,h.currency)&&h.total>0,notes:"Criado automaticamente pela hospedagem."})}data.days.forEach(d=>d.events=d.events.filter(e=>e.ref!==h.id));let din=data.days.find(d=>d.date===h.checkinDate);if(din)din.events.push(eventObj(h.checkinTime||"A preencher","Hospedagem","Check-in — "+(h.name||h.city),h.city,h.area,h.maps,h.id));let dout=data.days.find(d=>d.date===h.checkoutDate);if(dout)dout.events.push(eventObj(h.checkoutTime||"A preencher","Hospedagem","Check-out — "+(h.name||h.city),h.city,h.area,h.maps,h.id))}

function openFlight(id=""){let f=id?data.flights.find(x=>x.id===id):{id:"",title:"",date:"",country:"Chile",airline:"",flightNo:"",from:"",to:"",depart:"",arrive:"",locator:"",status:"A preencher",maps:"",notes:""};modal(id?"Editar voo":"Adicionar voo",`<div class="form">${inputField("fl_title","Trecho",f.title)}<div class="grid two">${inputField("fl_date","Data",f.date)}${selectField("fl_country","País",["Chile","Bolívia","Peru","Brasil","Geral"],f.country)}</div><div class="grid two">${inputField("fl_from","Origem",f.from)}${inputField("fl_to","Destino",f.to)}</div><div class="grid two">${inputField("fl_depart","Saída",f.depart)}${inputField("fl_arrive","Chegada",f.arrive)}</div><div class="grid two">${inputField("fl_air","Companhia",f.airline)}${inputField("fl_no","Voo",f.flightNo)}</div>${inputField("fl_locator","Localizador",f.locator)}${selectField("fl_status","Status",["A preencher","Comprado","Check-in aberto","Check-in feito","Concluído","Cancelado"],f.status)}${inputField("fl_maps","Mapa",f.maps)}${textField("fl_notes","Observações",f.notes)}<button class="btn full" onclick="saveFlight('${id}')">Salvar voo</button></div>`)}function saveFlight(id){let o={id:id||uid("fl"),title:val("fl_title"),date:val("fl_date"),country:val("fl_country"),from:val("fl_from"),to:val("fl_to"),depart:val("fl_depart"),arrive:val("fl_arrive"),airline:val("fl_air"),flightNo:val("fl_no"),locator:val("fl_locator"),status:val("fl_status"),maps:val("fl_maps"),notes:val("fl_notes")};upsert("flights",o);syncFlight(o);save();closeModal();render()}function syncFlight(f){data.days.forEach(d=>d.events=d.events.map(e=>e.ref===f.id?{...e,time:f.depart||"A preencher",title:"Voo "+f.title,place:f.from+" → "+f.to,notes:`Saída: ${f.depart||"A preencher"} · Chegada: ${f.arrive||"A preencher"} · ${f.airline||""} ${f.flightNo||""} · Localizador: ${f.locator||"a preencher"}`,maps:f.maps}:e));let d=data.days.find(x=>x.date===f.date);if(d&&!d.events.some(e=>e.ref===f.id))d.events.push(eventObj(f.depart function exportBackup(){let b=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="backup-altiplano-v6-2026.json";a.click();URL.revokeObjectURL(a.href)}function importBackup(e){let file=e.target.files[0];if(!file)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();alert("Backup importado!")}catch(err){alert("Backup inválido.")}};r.readAsText(file)}function resetApp(){if(confirm("Restaurar base inicial? Isso apaga os dados salvos neste navegador.")){localStorage.removeItem(LS);data=load();render()}}if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js").catch(()=>{}))}render();
