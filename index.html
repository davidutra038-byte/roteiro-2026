function expenses(){let all=byCountry(data.expenses),total=data.expenses.reduce((a,b)=>a+n(b.brlValue),0),paid=data.expenses.filter(e=>e.paid).reduce((a,b)=>a+n(b.brlValue),0),cat={};all.forEach(e=>cat[e.cat]=(cat[e.cat]||0)+n(e.brlValue));let max=Math.max(...Object.values(cat),1);return header('Gastos')+fbar()+`<div class="grid three"><div class="card total"><div class="k">Previsto</div><div class="money">${brl(total)}</div></div><div class="card"><div class="k">Pago</div><div class="money">${brl(paid)}</div></div><div class="card"><div class="k">Pendente</div><div class="money">${brl(total-paid)}</div></div></div><div class="card"><h2>Registrar gastos</h2><button class="btn" onclick="openExpense()">➕ Registrar gasto</button></div><div class="card"><h2>Por categoria</h2>${Object.entries(cat).map(([c,vv])=>`<div style="margin:12px 0"><div class="row" style="margin:0"><div><b>${c}</b><div class="small muted">${brl(vv)}</div></div><span class="pill">${Math.round(vv/total*100)||0}%</span></div><div class="progress" style="margin-top:8px"><div style="width:${Math.round(vv/max*100)}%"></div></div></div>`).join('')||'<div class="empty">Cadastre gastos.</div>'}</div>`+all.map(g=>`<div class="card"><h3>${g.name}</h3><span class="pill">${g.cat}</span><span class="pill ${scls(g.status)}">${g.status}</span>${g.paid?'<span class="pill green">Pago</span>':'<span class="pill gold">Pendente</span>'}<p><b>${brl(g.brlValue)}</b> · ${g.currency} ${g.localValue}</p><p class="small muted">${g.city||''} ${g.country?('· '+g.country):''}</p><div class="actions"><button class="btn light" onclick="openExpense('${g.id}')">Editar</button><button class="btn red" onclick="del('expenses','${g.id}')">Excluir</button></div></div>`).join('')}
function food(){return header('Comer')+fbar()+`<div class="card"><h2>Sorveterias, cafés, rooftops e restaurantes</h2><button class="btn" onclick="openFood()">➕ Adicionar lugar</button></div>`+byCountry(data.food).map(f=>`<div class="card"><h3>🍽️ ${f.name}</h3><span class="pill ${ccls(f.country)}">${f.country}</span><span class="pill">${f.cat}</span><span class="pill ${scls(f.status)}">${f.status}</span><span class="pill gray">${f.price}</span><p class="muted">${f.city}</p><div class="actions"><button class="btn light" onclick="openFood('${f.id}')">Editar</button><a class="btn gray" target="_blank" href="${f.maps}">Mapa</a><button class="btn red" onclick="del('food','${f.id}')">Excluir</button></div></div>`).join('')}
function packing(){let ks=data.packing.flatMap(g=>g.items.map(i=>g.group+'|'+i)),dn=ks.filter(k=>data.packState[k]).length,p=ks.length?Math.round(dn/ks.length*100):0;return header('Mala',false)+`<div class="card"><div class="k">Gestão da mala</div><h2>${dn}/${ks.length} itens conferidos</h2><div class="progress"><div style="width:${p}%"></div></div><p class="muted">Mala de bordo + mochila para neve, deserto, altitude, trilhas e cidades.</p></div><div class="card"><h2>O que não pode esquecer</h2><div class="row"><div><b>Frio/neve</b><div class="small muted">Segunda pele, puffer, luva, gorro, bota</div></div><span>❄️</span></div><div class="row"><div><b>Trilha/altitude</b><div class="small muted">Camadas, água, lanche, protetor, remédios</div></div><span>⛰️</span></div><div class="row"><div><b>Deserto/praia</b><div class="small muted">Óculos, protetor, roupa leve, corta-vento</div></div><span>☀️</span></div></div>`+data.packing.map(g=>`<details open><summary>${g.group}</summary>${g.items.map(i=>{let k=g.group+'|'+i;return `<label class="check"><input type="checkbox" ${data.packState[k]?'checked':''} onchange="data.packState['${esc(k)}']=this.checked;save();render()"><span>${i}</span><span class="pill gray">levar</span></label>`}).join('')}</details>`).join('')}
function maps(){let places=[...data.stays.map(h=>({name:h.name||h.city,city:h.city,country:h.country,type:'Hospedagem',maps:h.maps})),...data.tours.map(t=>({name:t.name,city:t.city,country:t.country,type:'Passeio',maps:t.maps})),...data.food.map(f=>({name:f.name,city:f.city,country:f.country,type:f.cat,maps:f.maps})),...data.flights.map(f=>({name:f.title,city:f.to,country:'',type:'Voo',maps:f.maps}))].filter(matches).filter(p=>state.filter==='Todos'||p.country===state.filter);return header('Mapas')+fbar()+`<div class="card"><h2>Mapas de tudo</h2><p class="muted">Hotéis, voos/aeroportos, passeios e restaurantes.</p></div>`+places.map(p=>`<a class="row" style="text-decoration:none;color:inherit" target="_blank" href="${p.maps}"><div><b>📍 ${p.name}</b><div class="small muted">${p.type} · ${p.city} ${p.country?('· '+p.country):''}</div></div><span class="pill">Abrir</span></a>`).join('')}
function converter(){return header('Conversor',false)+`<div class="card"><h2>Conversor manual</h2><p class="muted">Ajuste as taxas conforme o câmbio do dia. Não depende de internet.</p><div class="form"><div class="two grid"><input id="ca" inputmode="decimal" placeholder="Valor" oninput="conv()"><select id="cc" onchange="conv()"><option>CLP</option><option>BOB</option><option>PEN</option><option>USD</option></select></div><div class="row"><div><b>Resultado em reais</b><div id="cr" class="money">R$ 0</div></div></div></div></div><div class="card"><h2>Taxas usadas</h2><div class="form">${['CLP','BOB','PEN','USD'].map(c=>`<div class="row"><div><b>1 ${c} em R$</b><input id="r_${c}" inputmode="decimal" value="${data.rates[c]}" oninput="data.rates['${c}']=n(this.value);save();conv()"></div></div>`).join('')}</div></div>`}function conv(){let a=document.getElementById('ca'),c=document.getElementById('cc'),r=document.getElementById('cr');if(a&&c&&r)r.textContent=brl(n(a.value)*n(data.rates[c.value]))}
function backup(){return header('Backup',false)+`<div class="card"><h2>Backup</h2><p class="muted">O app salva automaticamente no navegador. Exporte um JSON para não perder suas informações.</p><div class="actions"><button class="btn" onclick="exportB()">Exportar JSON</button><label class="btn light">Importar JSON<input type="file" accept=".json" style="display:none" onchange="importB(event)"></label><button class="btn red" onclick="reset()">Restaurar base</button></div></div><div class="card"><h2>Anotações gerais</h2><textarea oninput="data.notes=this.value;save()">${esc(data.notes)}</textarea></div>`}
function M(t,b){document.getElementById('mt').textContent=t;document.getElementById('mc').innerHTML=b;document.getElementById('mbg').classList.add('show')}function closeM(){document.getElementById('mbg').classList.remove('show')}function openDayEdit(i){let d=data.days.find(x=>x.id===i);M('Editar dia',`<div class="form"><input id="dy_city" value="${esc(d.city)}"><input id="dy_sleep" value="${esc(d.sleep)}"><input id="dy_weather" value="${esc(d.weather)}"><textarea id="dy_summary">${esc(d.summary)}</textarea><button class="btn full" onclick="saveDay('${i}')">Salvar</button></div>`)}function saveDay(i){let d=data.days.find(x=>x.id===i);d.city=val('dy_city');d.sleep=val('dy_sleep');d.weather=val('dy_weather');d.summary=val('dy_summary');save();closeM();render()}function dayOpts(s=''){return data.days.map(d=>`<option value="${d.id}" ${d.id===s?'selected':''}>Dia ${d.num} — ${d.date} — ${d.city}</option>`).join('')}function openEvent(di='',ei=''){let d=di?data.days.find(x=>x.id===di):data.days[0],e=ei?d.events.find(x=>x.id===ei):{time:'',type:'Passeio',title:'',place:'',notes:'',maps:''};M(ei?'Editar evento':'Adicionar evento',`<div class="form"><select id="ev_day">${dayOpts(di||d.id)}</select><input id="ev_time" placeholder="Horário" value="${esc(e.time)}"><select id="ev_type">${['Voo','Transporte','Hospedagem','Passeio','Gastronomia','Livre','Documento','Outro'].map(x=>opt(x,e.type)).join('')}</select><input id="ev_title" placeholder="Título" value="${esc(e.title)}"><input id="ev_place" placeholder="Local" value="${esc(e.place)}"><input id="ev_maps" placeholder="Mapa" value="${esc(e.maps)}"><textarea id="ev_notes" placeholder="Obs">${esc(e.notes)}</textarea><button class="btn full" onclick="saveEvent('${di}','${ei}')">Salvar</button></div>`)}function saveEvent(od,ei){let nd=data.days.find(d=>d.id===val('ev_day')),o={id:ei||id('ev'),time:val('ev_time'),type:val('ev_type'),title:val('ev_title'),place:val('ev_place'),maps:val('ev_maps'),notes:val('ev_notes'),ref:''};if(!o.title)return alert('Digite o título.');if(ei&&od){let old=data.days.find(d=>d.id===od);old.events=old.events.filter(e=>e.id!==ei)}nd.events.push(o);currentDay=nd.id;save();closeM();render()}function delEvent(di,ei){if(confirm('Excluir evento?')){let d=data.days.find(x=>x.id===di);d.events=d.events.filter(e=>e.id!==ei);save();render()}}
function openFlight(i=''){let f=i?data.flights.find(x=>x.id===i):{title:'',date:'',airline:'',flightNo:'',from:'',to:'',depart:'',arrive:'',locator:'',status:'A preencher',maps:'',notes:''};M(i?'Editar voo':'Adicionar voo',`<div class="form"><input id="fl_title" placeholder="Trecho" value="${esc(f.title)}"><input id="fl_date" placeholder="Data" value="${esc(f.date)}"><div class="grid two"><input id="fl_from" placeholder="Origem" value="${esc(f.from)}"><input id="fl_to" placeholder="Destino" value="${esc(f.to)}"></div><div class="grid two"><input id="fl_depart" placeholder="Saída" value="${esc(f.depart)}"><input id="fl_arrive" placeholder="Chegada" value="${esc(f.arrive)}"></div><div class="grid two"><input id="fl_air" placeholder="Companhia" value="${esc(f.airline)}"><input id="fl_no" placeholder="Voo" value="${esc(f.flightNo)}"></div><input id="fl_loc" placeholder="Localizador" value="${esc(f.locator)}"><select id="fl_status">${['A preencher','Comprado','Check-in aberto','Check-in feito','Concluído','Cancelado'].map(x=>opt(x,f.status)).join('')}</select><input id="fl_maps" placeholder="Mapa" value="${esc(f.maps)}"><textarea id="fl_notes">${esc(f.notes)}</textarea><button class="btn full" onclick="saveFlight('${i}')">Salvar</button></div>`)}function saveFlight(i){upsert('flights',{id:i||id('fl'),title:val('fl_title'),date:val('fl_date'),from:val('fl_from'),to:val('fl_to'),depart:val('fl_depart'),arrive:val('fl_arrive'),airline:val('fl_air'),flightNo:val('fl_no'),locator:val('fl_loc'),status:val('fl_status'),maps:val('fl_maps'),notes:val('fl_notes')});save();closeM();render()}
function openStay(i=''){let h=i?data.stays.find(x=>x.id===i):{city:'',country:'Chile',name:'',checkinDate:'',checkoutDate:'',checkinTime:'',checkoutTime:'',area:'',maps:'',code:'',contact:'',total:0,paid:0,status:'Pesquisando',notes:'',expenseId:''};M(i?'Editar hospedagem':'Adicionar hospedagem',`<div class="form"><input id="h_name" placeholder="Nome do hotel" value="${esc(h.name)}"><div class="grid two"><input id="h_city" placeholder="Cidade" value="${esc(h.city)}"><select id="h_country">${['Chile','Bolívia','Peru','Brasil','Geral'].map(x=>opt(x,h.country)).join('')}</select></div><input id="h_area" placeholder="Área" value="${esc(h.area)}"><div class="grid two"><input id="h_inD" placeholder="Data check-in" value="${esc(h.checkinDate)}"><input id="h_inT" placeholder="Hora" value="${esc(h.checkinTime)}"></div><div class="grid two"><input id="h_outD" placeholder="Data check-out" value="${esc(h.checkoutDate)}"><input id="h_outT" placeholder="Hora" value="${esc(h.checkoutTime)}"></div><input id="h_maps" placeholder="Mapa" value="${esc(h.maps)}"><input id="h_code" placeholder="Código reserva" value="${esc(h.code)}"><input id="h_contact" placeholder="Contato" value="${esc(h.contact)}"><div class="grid two"><input id="h_total" inputmode="decimal" placeholder="Total R$" value="${h.total||''}"><input id="h_paid" inputmode="decimal" placeholder="Pago R$" value="${h.paid||''}"></div><select id="h_status">${['Pesquisando','Pendente','Reservado','Pago','Cancelado'].map(x=>opt(x,h.status)).join('')}</select><textarea id="h_notes">${esc(h.notes)}</textarea><button class="btn full" onclick="saveStay('${i}')">Salvar</button></div>`)}function saveStay(i){let old=i?data.stays.find(x=>x.id===i):null,o={id:i||id('h'),name:val('h_name'),city:val('h_city'),country:val('h_country'),area:val('h_area'),checkinDate:val('h_inD'),checkinTime:val('h_inT'),checkoutDate:val('h_outD'),checkoutTime:val('h_outT'),maps:val('h_maps'),code:val('h_code'),contact:val('h_contact'),total:n(val('h_total')),paid:n(val('h_paid')),status:val('h_status'),notes:val('h_notes'),expenseId:old?.expenseId||''};upsert('stays',o);syncStay(o);save();closeM();render()}function syncStay(h){if(h.total>0){let eid=h.expenseId||id('g');h.expenseId=eid;upsert('expenses',{id:eid,linkedType:'stay',linkedId:h.id,name:'Hospedagem — '+(h.name||h.city),cat:'Hospedagem',country:h.country,city:h.city,currency:'BRL',localValue:h.total,brlValue:h.total,status:h.status==='Pago'?'Pago':'Previsto',paid:h.paid>=h.total&&h.total>0,notes:'Criado automaticamente pela hospedagem.'})}data.days.forEach(d=>d.events=d.events.filter(e=>e.ref!==h.id));let din=data.days.find(d=>d.date===h.checkinDate);if(din)din.events.push(mkEv(h.checkinTime||'A preencher','Hospedagem','Check-in — '+(h.name||h.city),h.city,h.area,h.maps,h.id));let dout=data.days.find(d=>d.date===h.checkoutDate);if(dout)dout.events.push(mkEv(h.checkoutTime||'A preencher','Hospedagem','Check-out — '+(h.name||h.city),h.city,h.area,h.maps,h.id))}
function openTour(i=''){let t=i?data.tours.find(x=>x.id===i):{name:'',date:'',city:'',country:'Peru',time:'',agency:'A preencher',contact:'',value:0,status:'Pendente',effort:'Médio',altitude:'Média',maps:'',bring:'',look:'',notes:'',expenseId:''};M(i?'Editar passeio':'Adicionar passeio',`<div class="form"><input id="t_name" placeholder="Nome" value="${esc(t.name)}"><div class="grid two"><input id="t_date" placeholder="Data" value="${esc(t.date)}"><input id="t_time" placeholder="Horário" value="${esc(t.time)}"></div><div class="grid two"><input id="t_city" placeholder="Cidade" value="${esc(t.city)}"><select id="t_country">${['Chile','Bolívia','Peru','Geral'].map(x=>opt(x,t.country)).join('')}</select></div><input id="t_agency" placeholder="Agência" value="${esc(t.agency)}"><input id="t_contact" placeholder="Contato/link" value="${esc(t.contact)}"><input id="t_value" inputmode="decimal" placeholder="Valor R$" value="${t.value||''}"><div class="grid two"><select id="t_status">${['Pendente','Agendado','Pago','Concluído','Cancelado'].map(x=>opt(x,t.status)).join('')}</select><select id="t_effort">${['Leve','Leve/Médio','Médio','Alto'].map(x=>opt(x,t.effort)).join('')}</select></div><select id="t_altitude">${['Baixa','Média','Alta','Muito alta'].map(x=>opt(x,t.altitude)).join('')}</select><input id="t_maps" placeholder="Mapa" value="${esc(t.maps)}"><textarea id="t_bring" placeholder="O que levar">${esc(t.bring)}</textarea><textarea id="t_look" placeholder="Look">${esc(t.look)}</textarea><textarea id="t_notes" placeholder="Obs">${esc(t.notes)}</textarea><button class="btn full" onclick="saveTour('${i}')">Salvar</button></div>`)}function saveTour(i){let old=i?data.tours.find(x=>x.id===i):null,o={id:i||id('t'),name:val('t_name'),date:val('t_date'),time:val('t_time'),city:val('t_city'),country:val('t_country'),agency:val('t_agency'),contact:val('t_contact'),value:n(val('t_value')),status:val('t_status'),effort:val('t_effort'),altitude:val('t_altitude'),maps:val('t_maps'),bring:val('t_bring'),look:val('t_look'),notes:val('t_notes'),expenseId:old?.expenseId||''};upsert('tours',o);syncTour(o);save();closeM();render()}function syncTour(t){if(t.value>0){let eid=t.expenseId||id('g');t.expenseId=eid;upsert('expenses',{id:eid,linkedType:'tour',linkedId:t.id,name:'Passeio — '+t.name,cat:'Passeios',country:t.country,city:t.city,currency:'BRL',localValue:t.value,brlValue:t.value,status:t.status==='Pago'?'Pago':'Previsto',paid:t.status==='Pago',notes:'Criado automaticamente pelo passeio.'})}data.days.forEach(d=>d.events=d.events.filter(e=>e.ref!==t.id));let d=data.days.find(x=>x.date===String(t.date).slice(0,5));if(d)d.events.push(mkEv(t.time||'A preencher','Passeio',t.name,t.city,`Agência: ${t.agency}. ${t.notes}`,t.maps,t.id))}
function openExpense(i=''){let g=i?data.expenses.find(x=>x.id===i):{name:'',cat:'Passeios',country:'Geral',city:'',currency:'BRL',localValue:0,brlValue:0,status:'Previsto',paid:false,notes:''};M(i?'Editar gasto':'Adicionar gasto',`<div class="form"><input id="g_name" placeholder="Nome" value="${esc(g.name)}"><select id="g_cat">${['Voos','Hospedagem','Passeios','Transporte','Alimentação','Seguro','Compras','Emergência','Outros'].map(x=>opt(x,g.cat)).join('')}</select><div class="grid two"><input id="g_country" placeholder="País" value="${esc(g.country)}"><input id="g_city" placeholder="Cidade" value="${esc(g.city)}"></div><div class="grid two"><select id="g_cur">${['BRL','CLP','BOB','PEN','USD'].map(x=>opt(x,g.currency)).join('')}</select><input id="g_local" inputmode="decimal" placeholder="Valor local" value="${g.localValue||''}"></div><input id="g_brl" inputmode="decimal" placeholder="Valor em R$" value="${g.brlValue||''}"><select id="g_status">${['Previsto','Reservado','Pago','Cancelado'].map(x=>opt(x,g.status)).join('')}</select><label class="check"><input id="g_paid" type="checkbox" ${g.paid?'checked':''}><span>Já foi pago?</span><span class="pill gray">status</span></label><textarea id="g_notes">${esc(g.notes)}</textarea><button class="btn full" onclick="saveExpense('${i}')">Salvar</button></div>`)}function saveExpense(i){upsert('expenses',{id:i||id('g'),name:val('g_name'),cat:val('g_cat'),country:val('g_country'),city:val('g_city'),currency:val('g_cur'),localValue:n(val('g_local')),brlValue:n(val('g_brl')),status:val('g_status'),paid:document.getElementById('g_paid').checked,notes:val('g_notes')});save();closeM();render()}function openFood(i=''){let f=i?data.food.find(x=>x.id===i):{name:'',city:'',country:'Peru',cat:'Restaurante',status:'Quero ir',price:'Médio',maps:'',notes:''};M(i?'Editar lugar':'Adicionar lugar',`<div class="form"><input id="f_name" placeholder="Nome" value="${esc(f.name)}"><div class="grid two"><input id="f_city" placeholder="Cidade" value="${esc(f.city)}"><select id="f_country">${['Chile','Bolívia','Peru','Geral'].map(x=>opt(x,f.country)).join('')}</select></div><select id="f_cat">${['Restaurante','Café','Sorveteria','Rooftop','Barato e bom','Sunset','Doce típico','Outro'].map(x=>opt(x,f.cat)).join('')}</select><div class="grid two"><select id="f_status">${['Quero ir','Favorito','Fui','Descartado'].map(x=>opt(x,f.status)).join('')}</select><select id="f_price">${['Baixo','Baixo/Médio','Médio','Médio/Alto','Alto'].map(x=>opt(x,f.price)).join('')}</select></div><input id="f_maps" placeholder="Mapa" value="${esc(f.maps)}"><textarea id="f_notes">${esc(f.notes)}</textarea><button class="btn full" onclick="saveFood('${i}')">Salvar</button></div>`)}function saveFood(i){upsert('food',{id:i||id('f'),name:val('f_name'),city:val('f_city'),country:val('f_country'),cat:val('f_cat'),status:val('f_status'),price:val('f_price'),maps:val('f_maps'),notes:val('f_notes')});save();closeM();render()}
function upsert(c,o){let i=data[c].findIndex(x=>x.id===o.id);if(i>=0)data[c][i]=o;else data[c].push(o)}function del(c,i){if(confirm('Excluir?')){data[c]=data[c].filter(x=>x.id!==i);if(c==='stays'||c==='tours')data.days.forEach(d=>d.events=d.events.filter(e=>e.ref!==i));save();render()}}function exportB(){let b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='backup-trip-app-2026.json';a.click()}function importB(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{data=JSON.parse(r.result);save();render();alert('Backup importado!')}catch(err){alert('Backup inválido.')}};r.readAsText(f)}function reset(){if(confirm('Restaurar base inicial?')){localStorage.removeItem(LS);data=load();render()}}render();
</script>
